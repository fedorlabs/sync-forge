name: CI

on:
  push:
  pull_request:

jobs:
  tests-sqlite:
    name: PHP ${{ matrix.php }} SQLite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: pdo_sqlite

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint
        run: composer lint

      - name: Unit tests
        run: composer test-unit

      - name: Integration tests (SQLite)
        run: vendor/bin/phpunit --filter SyncPipelineSqliteTest

  tests-postgres:
    name: PostgreSQL Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sync_forge_test
          POSTGRES_USER: sync_forge
          POSTGRES_PASSWORD: sync_forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sync_forge -d sync_forge_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: pdo_pgsql

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PostgreSQL integration tests
        env:
          TEST_PG_DSN: pgsql://sync_forge:sync_forge@127.0.0.1:5432/sync_forge_test
        run: vendor/bin/phpunit --filter SyncPipelinePostgresTest

  tests-mysql:
    name: MySQL Integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: sync_forge_test
          MYSQL_USER: sync_forge
          MYSQL_PASSWORD: sync_forge
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: pdo_mysql

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: MySQL integration tests
        env:
          TEST_MYSQL_DSN: mysql://sync_forge:sync_forge@127.0.0.1:3306/sync_forge_test
        run: vendor/bin/phpunit --filter SyncPipelineMySqlTest
