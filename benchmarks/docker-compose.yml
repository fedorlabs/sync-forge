services:
  postgres:
    image: postgres:16
    container_name: syncforge-bench-postgres
    environment:
      POSTGRES_DB: sync_forge_bench
      POSTGRES_USER: sync_forge
      POSTGRES_PASSWORD: sync_forge
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sync_forge -d sync_forge_bench"]
      interval: 5s
      timeout: 5s
      retries: 20

  mariadb:
    image: mariadb:11
    container_name: syncforge-bench-mariadb
    environment:
      MARIADB_DATABASE: sync_forge_bench
      MARIADB_USER: sync_forge
      MARIADB_PASSWORD: sync_forge
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "33069:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
